services:
  kafka:
    # ARM64-safe multi-arch image
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9093"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:9093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  localstack:
    # LocalStack emulates S3 + Athena + Glue for local dev
    image: localstack/localstack:3.4
    ports: ["4566:4566"]
    environment:
      SERVICES: s3,athena,glue,iam
      AWS_DEFAULT_REGION: ap-south-1
      PERSISTENCE: 0
    volumes:
      - localstack-data:/var/lib/localstack

  audit-compliance-sink:
    image: audit-compliance-sink:local
    ports: ["8083:8080"]
    environment:
      KAFKA_BROKERS: kafka:9092
      AWS_REGION: ap-south-1
      AWS_ENDPOINT_OVERRIDE: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      HUMAN_AUDIT_BUCKET: repositree-human-audit
      AGENT_TRACE_BUCKET: repositree-agent-trace
      ATHENA_DATABASE: audit_compliance
      ATHENA_OUTPUT_BUCKET: s3://repositree-athena-results/
      JWKS_URI: http://auth-service:8080/.well-known/jwks.json
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms64m"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  localstack-data:
